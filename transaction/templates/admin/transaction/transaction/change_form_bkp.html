{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<style>
    /* Hide edit and view buttons for user autocomplete fields in splits */
    .user-autocomplete-no-buttons + .select2-container ~ a,
    .user-autocomplete-no-buttons + .select2-container .select2-selection__clear + a,
    .select2-container .select2-selection__clear + a[href*="user"],
    .select2-container ~ a[href*="user"] {
        display: none !important;
    }
    /* Alternative selector for DAL buttons */
    .select2-container[data-field-name*="user"] ~ a,
    .select2-container[data-field-name*="user"] + a,
    tr[id*="splits"] .select2-container ~ a,
    tr[id*="splits"] a[href*="user"] {
        display: none !important;
    }
    /* Override Select2 disabled background color - keep it default */
    .select2-container--default.select2-container--disabled .select2-selection--single {
        background-color: transparent !important;
        background: none !important;
    }
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const $ = (window.django && django.jQuery) ? django.jQuery : window.jQuery;
    
    // Get exchange rate record data from the form
    // Check if instance has exchange_rate_record (form sets initial values when it exists)
    {% if original and original.exchange_rate_record %}
    const hasExchangeRateRecordFromForm = true;
    // Calculate transaction currency amount from exchange rate record directly
    // transaction_amount = account_amount / exchange_rate
    // exchange_rate is: X account_currency = transaction_currency
    {% if original.amount and original.exchange_rate_record.provider_rate %}
    const transactionCurrencyAmountInitial = {{ original.amount|floatformat:2 }} / {{ original.exchange_rate_record.provider_rate }};
    {% else %}
    const transactionCurrencyAmountInitial = null;
    {% endif %}
    const exchangeRateInitial = {% if original.exchange_rate_record.provider_rate %}{{ original.exchange_rate_record.provider_rate }}{% else %}null{% endif %};
    // Get transaction currency code from exchange rate record (quote_currency)
    // This is the actual transaction currency, not the account currency
    const transactionCurrencyCodeFromExchange = {% if original.exchange_rate_record.quote_currency.code %}"{{ original.exchange_rate_record.quote_currency.code }}"{% else %}null{% endif %};
    {% else %}
    const transactionCurrencyAmountInitial = null;
    const exchangeRateInitial = null;
    const hasExchangeRateRecordFromForm = false;
    const transactionCurrencyCodeFromExchange = null;
    {% endif %}

    // --- Cached DOM elements ---
    const txType        = document.getElementById('id_transaction_type');
    const accountSel    = document.getElementById('id_account');
    const toAccountSel  = document.getElementById('id_to_account');
    const storeSel      = document.getElementById('id_store');
    const currencySel   = document.getElementById('id_currency');
    const categorySel   = document.getElementById('id_category');
    const feeField      = document.getElementById('id_fee_amount');
    const toAmountField = document.getElementById('id_to_amount');
    const transactionCurrencyAmountField = document.getElementById('id_transaction_currency_amount');
    const exchangeRateField = document.getElementById('id_exchange_rate');
    const amountField = document.getElementById('id_amount');
    const splitMethodField = document.getElementById('id_split_method');  // Main split method selector

    // Labels
    const accountLabel  = document.querySelector("label[for='id_account']");
    const toAccountLabel= document.querySelector("label[for='id_to_account']");
    const amountLabel   = document.querySelector("label[for='id_amount']");
    const feeLabel      = document.querySelector("label[for='id_fee_amount']");
    const toAmountLabel = document.querySelector("label[for='id_to_amount']");
    const transactionCurrencyAmountLabel = document.querySelector("label[for='id_transaction_currency_amount']");

    // Field containers
    const feeRow        = feeField ? feeField.closest('.form-row, .form-group, .field-box') : null;
    const toAccountRow  = toAccountSel ? toAccountSel.closest('.form-row, .form-group, .field-box') : null;
    const toAmountRow   = toAmountField ? toAmountField.closest('.form-row, .form-group, .field-box') : null;
    const transactionCurrencyAmountRow = transactionCurrencyAmountField ? transactionCurrencyAmountField.closest('.form-row, .form-group, .field-box') : null;
    const exchangeRateRow = exchangeRateField ? exchangeRateField.closest('.form-row, .form-group, .field-box') : null;

    // --- State ---
    let fromCurrency = null;
    let toCurrency   = null;
    let accountCurrency = null;

    /* ============================
        Utility helpers
    ============================ */
    function fetchJSON(url, cb) {
        fetch(url)
            .then(r => (r.ok ? r.json() : Promise.reject()))
            .then(d => cb(d))
            .catch(() => cb({}));
    }

    function fetchCurrency(accountId, cb) {
        if (!accountId) return cb(null);
        fetchJSON(`/admin/transaction/transaction/ajax/get-currency/?account_id=${accountId}`, data => {
            cb(data.currency_name || null);
        });
    }

    function fetchCurrencyCode(currencyId, cb) {
        if (!currencyId) return cb(null);
        fetchJSON(`/admin/transaction/transaction/ajax/get-currency-code/?currency_id=${currencyId}`, data => {
            cb(data.currency_code || null);
        });
    }

    function checkCrossCurrencyFields() {
        // Check if exchange rate record exists from form data
        // The form sets transaction_currency_amount initial value when exchange_rate_record exists
        let hasRecord = hasExchangeRateRecordFromForm;
        
        // Also check if the field is readonly (set by form when exchange_rate_record exists)
        const isReadonlyFromForm = transactionCurrencyAmountField && 
                                    (transactionCurrencyAmountField.hasAttribute('readonly') || 
                                    transactionCurrencyAmountField.classList.contains('readonly'));
        
        // Use form data or readonly attribute to determine if record exists
        const hasExchangeRateRecord = hasRecord || isReadonlyFromForm;
        
        // Check if transaction currency differs from account currency
        const currencyId = currencySel?.value;
        if (!currencyId || !accountCurrency) {
            // Hide fields if no currency selected or no account currency
            if (transactionCurrencyAmountRow) transactionCurrencyAmountRow.style.display = 'none';
            if (exchangeRateRow) exchangeRateRow.style.display = 'none';
            // Make amount field editable if not cross-currency
            if (amountField) {
                amountField.removeAttribute('readonly');
                amountField.classList.remove('readonly');
                amountField.placeholder = '';
            }
            return;
        }
        
        // Fetch transaction currency code
        fetchCurrencyCode(currencyId, transactionCurrency => {
            const isCrossCurrency = accountCurrency && transactionCurrency && accountCurrency !== transactionCurrency;
            
            // Show transaction currency amount field ONLY if exchange rate record exists
            if (transactionCurrencyAmountRow) {
                transactionCurrencyAmountRow.style.display = hasExchangeRateRecord ? '' : 'none';
            }
            
            // Show exchange rate field if cross-currency
            if (exchangeRateRow) {
                exchangeRateRow.style.display = isCrossCurrency ? '' : 'none';
            }
            // Transaction currency amount field is readonly (calculated from account amount / exchange rate)
            if (hasExchangeRateRecord && transactionCurrencyAmountField) {
                // Transaction currency amount is readonly when exchange rate record exists
                transactionCurrencyAmountField.setAttribute('readonly', 'readonly');
                transactionCurrencyAmountField.classList.add('readonly');
                // Update label to include transaction currency code from exchange rate record
                // (transaction currency is changed to account currency after exchange rate record is created)
                if (transactionCurrencyAmountLabel) {
                    if (transactionCurrencyCodeFromExchange) {
                        transactionCurrencyAmountLabel.textContent = `Transaction amount (${transactionCurrencyCodeFromExchange}):`;
                    } else if (transactionCurrency) {
                        transactionCurrencyAmountLabel.textContent = `Transaction amount (${transactionCurrency}):`;
                    }
                }
                // Calculate it from account amount and exchange rate
                calculateTransactionCurrencyAmount();
            } else if (transactionCurrencyAmountField) {
                // No exchange rate record, make sure it's not readonly (though it should be hidden)
                transactionCurrencyAmountField.removeAttribute('readonly');
                transactionCurrencyAmountField.classList.remove('readonly');
                // Reset label
                if (transactionCurrencyAmountLabel) {
                    transactionCurrencyAmountLabel.textContent = 'Transaction amount:';
                }
            }
            if (!isCrossCurrency && amountField) {
                // Not cross-currency, make sure amount is editable
                amountField.removeAttribute('readonly');
                amountField.classList.remove('readonly');
                amountField.placeholder = '';
            }
        });
    }

    function setSelectValue(selectEl, value, text) {
        if (!selectEl || !value) return;
        if ($ && $(selectEl).data('select2')) {
            if (!$(selectEl).find(`option[value='${value}']`).length) {
                const newOption = new Option(text || value, value, true, true);
                $(selectEl).append(newOption).trigger('change');
            } else {
                $(selectEl).val(String(value)).trigger('change');
            }
        } else {
            selectEl.value = String(value);
            selectEl.dispatchEvent(new Event('change', { bubbles: true }));
        }
    }

    /* ============================
        Core label/field logic
    ============================ */
    function toggleTransferFields() {
        const val = (txType?.value || "").toLowerCase();
        const isTransfer = val.includes('transfer');
        const isDebit  = val === 'transfer_debit';
        const isCredit = val === 'transfer_credit';

        // Always show fee field, hide to_amount and to_account for non-transfers
        if (feeRow) feeRow.style.display = '';
        if (toAccountRow) toAccountRow.style.display = isTransfer ? '' : 'none';
        // toAmountRow visibility will be controlled by checkCurrencyDifference() for transfers
        if (!isTransfer && toAmountRow) toAmountRow.style.display = 'none';

        // Reset labels
        if (accountLabel) accountLabel.textContent = "Account:";
        if (amountLabel) amountLabel.textContent  = "Amount:";
        if (feeLabel) feeLabel.textContent = "Fee amount:";

        if (!isTransfer) {
            // For non-transfers, fee is always visible with simple label
            return;
        }

        // Mirror labels for debit/credit
        if (isDebit) {
            accountLabel.textContent  = "From account:";
            toAccountLabel.textContent = "To account:";
        } else if (isCredit) {
            accountLabel.textContent  = "To account:";
            toAccountLabel.textContent = "From account:";
        }

        checkCurrencyDifference();
    }

    function checkCurrencyDifference() {
        const val = (txType?.value || "").toLowerCase();
        const isTransfer = val.includes('transfer');
        const isDebit  = val === 'transfer_debit';
        const isCredit = val === 'transfer_credit';
        
        // Fee field is always visible, but update labels for transfers
        if (!isTransfer) {
            if (feeLabel) feeLabel.textContent = "Fee amount:";
            return;
        }

        if (fromCurrency && toCurrency && fromCurrency !== toCurrency) {
            // Cross-currency transfer - show to_amount field with currency-specific labels
            if (toAmountRow) toAmountRow.style.display = '';
            if (isDebit) {
                if (amountLabel) amountLabel.textContent = fromCurrency ? `Sent Amount (excl. fees)(${fromCurrency})` : 'Sent Amount (excl. fees)';
                if (feeLabel) feeLabel.textContent = fromCurrency ? `Fee Amount (${fromCurrency}):` : 'Fee Amount:';
                if (toAmountLabel) toAmountLabel.textContent = toCurrency ? `Received Amount (${toCurrency}):` : 'Received Amount:';
            } else if (isCredit) {
                if (amountLabel) amountLabel.textContent = fromCurrency ? `Received Amount (${fromCurrency})` : 'Received Amount';
                if (feeLabel) feeLabel.textContent = toCurrency ? `Fee Amount (${toCurrency}):` : 'Fee Amount:';
                if (toAmountLabel) toAmountLabel.textContent = toCurrency ? `Sent Amount (excl. fees)(${toCurrency}):` : 'Sent Amount (excl. fees):';
            }
        } else {
            // Same currency transfer - hide to_amount field and use simple labels
            if (toAmountRow) toAmountRow.style.display = 'none';
            const currency = fromCurrency || toCurrency;
            if (isDebit) {
                if (amountLabel) amountLabel.textContent = currency ? `Amount (${currency}):` : 'Amount:';
                if (feeLabel) feeLabel.textContent = currency ? `Fee Amount (${currency}):` : 'Fee Amount:';
            } else if (isCredit) {
                if (amountLabel) amountLabel.textContent = currency ? `Amount (${currency}):` : 'Amount:';
                if (feeLabel) feeLabel.textContent = currency ? `Fee Amount (${currency}):` : 'Fee Amount:';
            }
        }
    }

    /* ============================
        Event bindings
    ============================ */
    function bindSelectEvents(el, onChange) {
        if (!el) return;
        el.addEventListener('change', e => onChange(e.target.value));
        if ($) $(el).on('select2:select', e => onChange(e.params.data?.id || el.value));
    }

    // Bind account events
    bindSelectEvents(accountSel, id => {
        fetchCurrency(id, code => { 
            fromCurrency = code;
            accountCurrency = code;
            checkCurrencyDifference();
            checkCrossCurrencyFields();
        });
    });
    bindSelectEvents(toAccountSel, id => {
        fetchCurrency(id, code => { toCurrency = code; checkCurrencyDifference(); });
    });
    
    // Bind currency selector to check cross-currency
    bindSelectEvents(currencySel, () => {
        checkCrossCurrencyFields();
    });
    
    // Update transaction currency amount label when currency changes
    function updateTransactionCurrencyAmountLabel() {
        if (!transactionCurrencyAmountLabel || !hasExchangeRateRecordFromForm) return;
        
        // If we have the currency code from the exchange rate record, use that
        // (because after exchange rate record is created, transaction currency is changed to account currency)
        if (transactionCurrencyCodeFromExchange) {
            transactionCurrencyAmountLabel.textContent = `Transaction amount (${transactionCurrencyCodeFromExchange}):`;
            return;
        }
        
        // Fallback: try to get from currency selector
        const currencyId = currencySel?.value;
        if (currencyId) {
            fetchCurrencyCode(currencyId, transactionCurrency => {
                if (transactionCurrency && transactionCurrencyAmountLabel) {
                    transactionCurrencyAmountLabel.textContent = `Transaction amount (${transactionCurrency}):`;
                }
            });
        }
    }
    
    // Bind currency change to update label
    if (currencySel) {
        currencySel.addEventListener('change', updateTransactionCurrencyAmountLabel);
    }
    
    // Calculate transaction currency amount from account amount and exchange rate
    // This is calculated in Python (backend), but we update it in real-time when fields change
    function calculateTransactionCurrencyAmount() {
        if (!transactionCurrencyAmountField || !amountField) return;
        
        // Only calculate if transaction_currency_amount is readonly (exchange rate record exists)
        const isReadonly = transactionCurrencyAmountField.hasAttribute('readonly') || 
                            transactionCurrencyAmountField.classList.contains('readonly');
        if (!isReadonly) {
            return;
        }
        
        const accountAmount = parseFloat(amountField.value);
        
        // Get exchange rate from the Exchange Rate field (this is the source of truth)
        let exchangeRate = null;
        if (exchangeRateField && exchangeRateField.value) {
            exchangeRate = parseFloat(exchangeRateField.value);
        }
        
        // If exchange rate field is empty, try to use the initial value from form
        if ((!exchangeRate || exchangeRate === 0 || isNaN(exchangeRate)) && hasExchangeRateRecordFromForm && exchangeRateInitial) {
            exchangeRate = parseFloat(exchangeRateInitial);
        }
        
        // Calculate transaction amount using the exchange rate from the Exchange Rate field
        if (accountAmount && accountAmount > 0 && exchangeRate && exchangeRate > 0 && !isNaN(exchangeRate)) {
            // Calculate: transaction_amount = account_amount / exchange_rate
            // Exchange rate is: X account_currency = transaction_currency
            // So: transaction_amount = account_amount / X
            const calculatedTransactionAmount = (accountAmount / exchangeRate).toFixed(2);
            transactionCurrencyAmountField.value = calculatedTransactionAmount;
        } else if (hasExchangeRateRecordFromForm && transactionCurrencyAmountInitial) {
            // Fallback: use the initial value calculated by Python backend
            transactionCurrencyAmountField.value = parseFloat(transactionCurrencyAmountInitial).toFixed(2);
        }
    }
    
    // Bind events to recalculate transaction currency amount when account amount or exchange rate changes
    // This provides real-time updates, but the initial calculation is done in Python
    if (amountField) {
        amountField.addEventListener('input', calculateTransactionCurrencyAmount);
        amountField.addEventListener('blur', calculateTransactionCurrencyAmount);
    }
    if (exchangeRateField) {
        exchangeRateField.addEventListener('input', calculateTransactionCurrencyAmount);
        exchangeRateField.addEventListener('blur', calculateTransactionCurrencyAmount);
        exchangeRateField.addEventListener('change', calculateTransactionCurrencyAmount);
    }

    // Bind store/category autofill
    bindSelectEvents(storeSel, id => {
        fetchJSON(`/admin/transaction/transaction/ajax/get-category/?store_id=${id}`, data => {
            if (data.category_id) setSelectValue(categorySel, data.category_id, data.category_name);
        });
    });

    // Bind account→currency autofill
    bindSelectEvents(accountSel, id => {
        fetchJSON(`/admin/transaction/transaction/ajax/get-currency/?account_id=${id}`, data => {
            if (data.currency_id) setSelectValue(currencySel, data.currency_id, data.currency_name);
        });
    });

    // Transaction type change
    txType?.addEventListener('change', toggleTransferFields);

    /* ============================
        Initial load setup
    ============================ */
    const initialAccountId  = accountSel?.value;
    const initialToAccountId = toAccountSel?.value;
    if (initialAccountId)
        fetchCurrency(initialAccountId, code => { 
            fromCurrency = code;
            accountCurrency = code;
            checkCurrencyDifference();
            checkCrossCurrencyFields();
        });
    if (initialToAccountId)
        fetchCurrency(initialToAccountId, code => { toCurrency = code; checkCurrencyDifference(); });

    toggleTransferFields();
    checkCrossCurrencyFields();
    
    // Initial calculation on page load if exchange rate record exists
    // Update label with currency code first
    if (hasExchangeRateRecordFromForm) {
        updateTransactionCurrencyAmountLabel();
    }

    // Wait a bit for all fields to be ready, then set the value
    if (hasExchangeRateRecordFromForm) {
        setTimeout(() => {
            if (transactionCurrencyAmountField) {
                // First, try to get value from data attribute (set by Python)
                let initialValue = transactionCurrencyAmountField.getAttribute('data-initial-value');
                if (!initialValue && transactionCurrencyAmountInitial !== null && transactionCurrencyAmountInitial !== undefined) {
                    initialValue = transactionCurrencyAmountInitial;
                }
                // If we have an initial value, set it
                if (initialValue) {
                    const value = parseFloat(initialValue);
                    if (!isNaN(value)) {
                        transactionCurrencyAmountField.value = value.toFixed(2);
                        console.log(`[TransactionForm] Set transaction currency amount: ${value.toFixed(2)}`);
                    }
                }
                // Then recalculate to ensure it's in sync with current field values
                calculateTransactionCurrencyAmount();
            }
        }, 300);
    }

    /* ============================
        Transaction Split Auto-Fill Logic
    ============================ */
    
    // Define current user variables FIRST, before any functions that use them
    const currentUserEmail = '{{ request.user.email|escapejs }}';
    let currentUserId = {{ request.user.id|default:"null" }};
    
    // Try to find current user ID from the form if not available
    function findCurrentUserId() {
        if (currentUserId) {
            return currentUserId;
        }
        
        // Look for current user in any user select field
        const userSelects = document.querySelectorAll('select[id*="-user"], select[id*="user"]');
        
        for (const select of userSelects) {
            // Try Select2 first
            const $ = (window.django && django.jQuery) ? django.jQuery : window.jQuery;
            if ($ && $(select).data('select2')) {
                const select2Data = $(select).select2('data');
                if (select2Data && select2Data.length > 0) {
                    for (const item of select2Data) {
                        if (item.text && item.text.includes(currentUserEmail)) {
                            currentUserId = item.id;
                            return currentUserId;
                        }
                    }
                }
            }
            
            // Fallback: check option text
            const options = select.querySelectorAll('option');
            for (const option of options) {
                if (option.textContent && option.textContent.includes(currentUserEmail)) {
                    currentUserId = option.value;
                    return currentUserId;
                }
            }
        }
        
        return null;
    }
    
    function setupSplitAutoFill() {
        const amountField = document.getElementById('id_amount');
        if (!amountField) {
            console.log('[SplitAutoFill] Amount field not found');
            return;
        }
        
        console.log('[SplitAutoFill] Initialized for user:', currentUserEmail, 'ID:', currentUserId);
        
        function calculateRemainderSplit() {
            const transactionAmount = parseFloat(amountField.value) || 0;
            console.log('[SplitAutoFill] Calculating remainder, transaction amount:', transactionAmount);
            
            if (transactionAmount <= 0) {
                console.log('[SplitAutoFill] Transaction amount is 0 or invalid, skipping');
                return;
            }
            
            // Find current user ID if not already found
            const userId = findCurrentUserId();
            if (!userId) {
                console.warn('[SplitAutoFill] Cannot calculate remainder: current user ID not found');
                return;
            }
            
                // Find all split rows - try multiple selectors for Django admin inline structure
                // Django admin creates IDs like: transactionsplit_set-group (lowercase with underscores)
                let splitGroup = document.querySelector('#transactionsplit_set-group');
                
                // Try alternative ID formats
                if (!splitGroup) {
                    splitGroup = document.querySelector('#transactionsplit-group');
                }
                if (!splitGroup) {
                    splitGroup = document.querySelector('#transaction_split_set-group');
                }
                
                // Try finding by class and checking for TransactionSplit fields
                if (!splitGroup) {
                    const allInlineGroups = document.querySelectorAll('.inline-group');
                    console.log('[SplitAutoFill] Found', allInlineGroups.length, 'inline groups, searching for TransactionSplit...');
                    for (const group of allInlineGroups) {
                        // Log what's in each group for debugging
                        const groupId = group.id || 'no-id';
                        const groupTitle = group.querySelector('h2, h3, .inline-group-title')?.textContent || 'no-title';
                        console.log('[SplitAutoFill] Checking inline group:', groupId, 'Title:', groupTitle);
                        
                        // Check if this group contains TransactionSplit fields (using "splits" prefix from related_name)
                        const hasSplitField = group.querySelector('select[name*="splits-"], input[name*="splits-"], select[id*="splits-"], input[id*="splits-"]');
                        if (hasSplitField) {
                            splitGroup = group;
                            console.log('[SplitAutoFill] Found TransactionSplit group by field search');
                            break;
                        }
                        
                        // Also check for any fields that might be split-related (user + amount pattern)
                        const allSelects = group.querySelectorAll('select');
                        const allInputs = group.querySelectorAll('input[type="text"], input[type="number"]');
                        console.log('[SplitAutoFill] Group has', allSelects.length, 'selects and', allInputs.length, 'inputs');
                        
                        // Check if this looks like a split group (has user select and amount input)
                        let hasUserField = false;
                        let hasAmountField = false;
                        for (const sel of allSelects) {
                            if (sel.name && (sel.name.includes('user') || sel.id && sel.id.includes('user'))) {
                                hasUserField = true;
                                console.log('[SplitAutoFill] Found user field:', sel.name || sel.id);
                            }
                        }
                        for (const inp of allInputs) {
                            if (inp.name && (inp.name.includes('amount') || inp.id && inp.id.includes('amount'))) {
                                hasAmountField = true;
                                console.log('[SplitAutoFill] Found amount field:', inp.name || inp.id);
                            }
                        }
                        
                        // If it has both user and amount fields, it might be the split group
                        if (hasUserField && hasAmountField) {
                            // Check if it's NOT the items group (items have product, quantity, price)
                            const hasProductField = group.querySelector('select[name*="product"], input[name*="product"]');
                            if (!hasProductField) {
                                splitGroup = group;
                                console.log('[SplitAutoFill] Found potential split group by user+amount pattern');
                                break;
                            }
                        }
                    }
                }
                
                // Last resort: search entire document for TransactionSplit fields and find parent group
                if (!splitGroup) {
                    const anySplitField = document.querySelector('select[name*="splits-"], input[name*="splits-"]');
                    if (anySplitField) {
                        // Find the parent inline group
                        let parent = anySplitField.closest('.inline-group');
                        if (!parent) {
                            parent = anySplitField.closest('fieldset');
                        }
                        if (parent) {
                            splitGroup = parent;
                            console.log('[SplitAutoFill] Found TransactionSplit group by field parent');
                        }
                    }
                }
                
                if (!splitGroup) {
                    console.log('[SplitAutoFill] Split group not found - TransactionSplit inline may not be present');
                    return;
                }
                
                console.log('[SplitAutoFill] Found split group:', splitGroup.id || splitGroup.className);
                
                // Find all rows with form fields - ONLY rows that contain TransactionSplit fields
                const allRows = Array.from(splitGroup.querySelectorAll('tbody tr, .form-row, .inline-related')).filter(row => {
                    // Only include rows that have TransactionSplit fields (name/id contains "splits-" from related_name)
                    const hasSplitField = row.querySelector('select[name*="splits-"], input[name*="splits-"], select[id*="splits-"], input[id*="splits-"]');
                    return !!hasSplitField;
                });
                console.log('[SplitAutoFill] Found', allRows.length, 'TransactionSplit rows');
            
            let totalSplits = 0;
            let hasRemainderRow = false;
            let remainderRow = null;
            const filledRows = [];
            
            allRows.forEach((row, index) => {
                // Only look for TransactionSplit fields (using "splits-" prefix)
                const amountInput = row.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
                const userSelect = row.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
                const deleteCheckbox = row.querySelector('input[id*="splits-"][id*="DELETE"], input[name*="splits-"][name*="DELETE"]');
                
                // Skip deleted rows or header rows
                if (deleteCheckbox && deleteCheckbox.checked) return;
                if (!amountInput && !userSelect) return; // Not a TransactionSplit form row
                
                const amount = parseFloat(amountInput?.value) || 0;
                let rowUserId = userSelect?.value;
                
                // For Select2 widgets, get value from Select2 instance
                if (userSelect && $ && $(userSelect).data('select2')) {
                    const select2Val = $(userSelect).val();
                    if (select2Val) {
                        rowUserId = String(select2Val);
                    }
                }
                
                // Check if this is the remainder row (assigned to current user)
                if (rowUserId && (String(rowUserId) === String(userId) || 
                    (userSelect && userSelect.options[userSelect.selectedIndex]?.text?.includes(currentUserEmail)))) {
                    hasRemainderRow = true;
                    remainderRow = row;
                    console.log('[SplitAutoFill] Found remainder row at index', index);

    function setupSplitCalculator() {
        const $ = (window.django && django.jQuery) ? django.jQuery : window.jQuery;
        const amountField = document.getElementById('id_amount');
        
        // Run initialization immediately
        initializeAllSplitRows();
        
        if (!amountField) {
            // Still set up event listeners even without amount field
            setTimeout(initializeAllSplitRows, 500);
            return;
        }
        function getTransactionAmount() {
            return parseFloat(amountField.value) || 0;
        }
        function calculateSplitAmount(row) {
            // Get method from main form field, not individual row
            const method = getCurrentSplitMethod();
            const splitValueInput = row.querySelector('.split-value-input, input[id*="split_value"], input[name*="split_value"]');
            const amountInput = row.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
            if (!amountInput) return;
            const transactionAmount = getTransactionAmount();
            if (transactionAmount <= 0) return;
            let calculatedAmount = 0;
            
            if (method === 'equally') {
                // Equally: divide transaction amount equally among all non-deleted splits
                const splitGroup = row.closest('.inline-group, #splits-group, fieldset');
                let validSplitCount = 0;
                if (splitGroup) {
                    splitGroup.querySelectorAll('tbody tr, .form-row, .inline-related').forEach(splitRow => {
                        const deleteCheckbox = splitRow.querySelector('input[id*="DELETE"], input[name*="DELETE"]');
                        const userSelect = splitRow.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
                        if (!deleteCheckbox || !deleteCheckbox.checked) {
                            if (userSelect && userSelect.value) {
                                validSplitCount++;
                            }
                        }
                    });
                }
                if (validSplitCount > 0) {
                    calculatedAmount = transactionAmount / validSplitCount;
                }
            } else if (method === 'shares' && splitValueInput) {
                const shares = parseFloat(splitValueInput.value) || 0;
                if (shares > 0) {
                    // Get total shares from all rows using shares method
                    const splitGroup = row.closest('.inline-group, #splits-group, fieldset');
                    let totalShares = 0;
                    if (splitGroup) {
                        splitGroup.querySelectorAll('.split-value-input, input[id*="split_value"], input[name*="split_value"]').forEach(input => {
                            const inputRow = input.closest('tr');
                            const rowMethodSelect = inputRow ? inputRow.querySelector('.split-method-select, select[id*="split_method"], select[name*="split_method"]') : null;
                            if (rowMethodSelect && rowMethodSelect.value === 'shares') {
                                const deleteCheckbox = inputRow ? inputRow.querySelector('input[id*="DELETE"], input[name*="DELETE"]') : null;
                                const val = parseFloat(input.value) || 0;
                                if (val > 0 && (!deleteCheckbox || !deleteCheckbox.checked)) {
                                    totalShares += val;
                                }
                            }
                        });
                    }
                    
                    if (totalShares > 0) {
                        calculatedAmount = (transactionAmount * shares) / totalShares;
                    }
                }
            } else if (method === 'percentage' && splitValueInput) {
                const percentage = parseFloat(splitValueInput.value) || 0;
                if (percentage > 0 && percentage <= 100) {
                    calculatedAmount = (transactionAmount * percentage) / 100;
                }
            } else if (method === 'unequally') {
                // Unequally: user enters amount directly, no calculation
                // Keep existing amount if set, otherwise return
                return;
            }
            
            // Always update amount when calculated (even if 0, to clear it)
            amountInput.value = calculatedAmount.toFixed(2);
            amountInput.dispatchEvent(new Event('input', { bubbles: true }));
            amountInput.dispatchEvent(new Event('change', { bubbles: true }));
            if ($) $(amountInput).trigger('input').trigger('change');
        }

                        const hasSplitAmountField = row.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
                        const isNotEmptyForm = !row.classList.contains('empty-form') && !row.classList.contains('add-row');
                        const deleteCheckbox = row.querySelector('input[id*="DELETE"]');
                        const isNotDeleted = !deleteCheckbox || !deleteCheckbox.checked;
                        return (hasSplitUserField || hasSplitAmountField) && isNotEmptyForm && isNotDeleted;
                    });
                    
                    const hasCurrentUserRow = existingRows.some(row => {
                        const userSelect = row.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
                        if (!userSelect) return false;
                        const rowUserId = userSelect.value;
                        const $ = (window.django && django.jQuery) ? django.jQuery : window.jQuery;
                        if ($ && $(userSelect).data('select2')) {
                            const select2Val = $(userSelect).val();
                            return select2Val && String(select2Val) === String(userId);
                        }
                        return rowUserId && String(rowUserId) === String(userId);
                    });
                    
                    if (hasCurrentUserRow) {
                        initialCurrentUserRowAdded = true;
                        console.log('[Init] Found existing current user row on page load, setting initialCurrentUserRowAdded = true');
                    }
                }
            }
        }, 500);
        
        function findSplitGroup() {
            // Try multiple selectors to find the splits inline group
            const allInlineGroups = document.querySelectorAll('.inline-group, fieldset');
            for (const group of allInlineGroups) {
                const hasSplitFields = group.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]') ||
                                      group.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
                if (hasSplitFields) {
                    return group;
                }
            }
            return null;
        }
        
        function countSplitRows(splitGroup) {
            if (!splitGroup) return 0;
            
            const rows = Array.from(splitGroup.querySelectorAll('tbody tr, .form-row, .inline-related')).filter(row => {
                const hasSplitUserField = row.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
                const hasSplitAmountField = row.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
                const isNotEmptyForm = !row.classList.contains('empty-form') && !row.classList.contains('add-row');
                const deleteCheckbox = row.querySelector('input[id*="DELETE"]');
                const isNotDeleted = !deleteCheckbox || !deleteCheckbox.checked;
                return (hasSplitUserField || hasSplitAmountField) && isNotEmptyForm && isNotDeleted;
            });
            return rows.length;
        }
        
        function checkAndAddCurrentUserRow() {
            if (isAddingCurrentUserRow) {
                console.log('[CheckAndAddCurrentUserRow] Already adding current user row, skipping');
                return;
            }
            
            const splitGroup = findSplitGroup();
            if (!splitGroup) {
                console.log('[CheckAndAddCurrentUserRow] Split group not found');
                return;
            }
            
            const rowCount = countSplitRows(splitGroup);
            console.log('[CheckAndAddCurrentUserRow] Found', rowCount, 'existing split rows, initialCurrentUserRowAdded:', initialCurrentUserRowAdded);
            
            // Only add the initial current user row once, when the first row is added
            // If we've already added it, don't add it again
            if (initialCurrentUserRowAdded) {
                console.log('[CheckAndAddCurrentUserRow] Initial current user row already added, skipping');
                return;
            }
            
            // If exactly one row exists (the first row just added), add current user row
            if (rowCount === 1) {
                // Check if the current user row already exists
                const userId = findCurrentUserId();
                if (!userId) {
                    console.log('[CheckAndAddCurrentUserRow] Current user ID not found');
                    return;
                }
                
                // Check if current user row exists
                const existingRows = Array.from(splitGroup.querySelectorAll('tbody tr, .form-row, .inline-related')).filter(row => {
                const hasSplitUserField = row.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
                const hasSplitAmountField = row.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
                const isNotEmptyForm = !row.classList.contains('empty-form') && !row.classList.contains('add-row');
                    const deleteCheckbox = row.querySelector('input[id*="DELETE"]');
                    const isNotDeleted = !deleteCheckbox || !deleteCheckbox.checked;
                    return (hasSplitUserField || hasSplitAmountField) && isNotEmptyForm && isNotDeleted;
                });
                
                const hasCurrentUserRow = existingRows.some(row => {
                    const userSelect = row.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
                    if (!userSelect) return false;
                    const rowUserId = userSelect.value;
                    // Check Select2 value if available
                    const $ = (window.django && django.jQuery) ? django.jQuery : window.jQuery;
                    if ($ && $(userSelect).data('select2')) {
                        const select2Val = $(userSelect).val();
                        return select2Val && String(select2Val) === String(userId);
                    }
                    return rowUserId && String(rowUserId) === String(userId);
                });
                
                if (hasCurrentUserRow) {
                    console.log('[CheckAndAddCurrentUserRow] Current user row already exists');
                    initialCurrentUserRowAdded = true; // Mark as added
                    return;
                }
                
                console.log('[CheckAndAddCurrentUserRow] First row detected, adding current user row with 100%');
                isAddingCurrentUserRow = true;
                
                // Try multiple ways to find the amount field
                let amountField = document.getElementById('id_amount');
                if (!amountField) {
                    amountField = document.querySelector('input[name="amount"]');
                }
                if (!amountField) {
                    amountField = document.querySelector('input[id*="amount"]');
                }
                
                const transactionAmount = amountField ? parseFloat(amountField.value) || 0 : 0;
                console.log('[CheckAndAddCurrentUserRow] Transaction amount:', transactionAmount, 'from field:', amountField ? amountField.id : 'not found');
                
                if (transactionAmount > 0) {
                    console.log('[CheckAndAddCurrentUserRow] Calling addNewSplitRowAjax with userId:', userId, 'amount:', 100);
                    addNewSplitRowAjax(userId, 100, function(currentUserRow) {
                        if (currentUserRow) {
                            console.log('[CheckAndAddCurrentUserRow] Current user row added successfully, making it non-editable');
                            populateCurrentUserRow(currentUserRow, userId, 100, transactionAmount, true);
                            initialCurrentUserRowAdded = true; // Mark that we've added the initial current user row
                        } else {
                            console.error('[CheckAndAddCurrentUserRow] Failed to add current user row - addNewSplitRowAjax returned null');
                        }
                        isAddingCurrentUserRow = false;
                    });
                } else {
                    console.warn('[CheckAndAddCurrentUserRow] Transaction amount is 0 or invalid, cannot add current user row');
                    isAddingCurrentUserRow = false;
                }
            }
        }
        
        // Direct click handler for add button - most reliable
        document.addEventListener('click', function(e) {
            const target = e.target;
            const addButton = target.closest('.add-row a, .add-row button, a.add-row, .add-row');
            
            if (!addButton) return;
            
            // Find the inline group
            const inlineGroup = addButton.closest('.inline-group, fieldset');
            if (!inlineGroup) return;
            
            // Check if this is the splits group
            const hasSplitFields = inlineGroup.querySelector('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]') ||
                                  inlineGroup.querySelector('input[id*="splits-"][id*="amount"], input[name*="splits-"][name*="amount"]');
            
            if (!hasSplitFields) return; // Not the splits group
            
            // Check row count before adding
            const rowCountBefore = countSplitRows(inlineGroup);
            console.log('[AddButtonClick] Add button clicked, row count before:', rowCountBefore);
            
            // If no rows exist, we'll ensure first row is current user after it's added
            if (rowCountBefore === 0) {
                console.log('[AddButtonClick] First row will be added, will ensure it's current user');
                // Use multiple checks to ensure we catch the row when it's added
                const checkMultipleTimes = function(attempts) {
                    attempts = attempts || 0;
                    if (attempts > 30) {
                        console.log('[AddButtonClick] Max attempts reached, giving up');
                        return;
                    }
                    
                    const rowCountAfter = countSplitRows(inlineGroup);
                    console.log('[AddButtonClick] Check attempt', attempts, 'row count:', rowCountAfter);
                    
                    if (rowCountAfter === 1) {
                        console.log('[AddButtonClick] Exactly 1 row detected, ensuring it's current user');
                        // Ensure first row is current user
                        ensureFirstRowIsCurrentUser();
                    } else if (rowCountAfter === 0) {
                        // Row not added yet, check again
                        requestAnimationFrame(function() {
                            checkMultipleTimes(attempts + 1);
                        });
            } else {
                        // More than 1 row - ensure first is current user
                        console.log('[AddButtonClick] Found', rowCountAfter, 'rows, ensuring first is current user');
                        ensureFirstRowIsCurrentUser();
                    }
                };
                
                // Start checking after a brief delay to let Django add the row
                requestAnimationFrame(function() {
                    checkMultipleTimes(0);
                });
            } else {
                // Rows already exist, ensure first is current user
                ensureFirstRowIsCurrentUser();
            }
        }, true); // Use capture phase to catch it early
        
        // Note: We don't use formset:added or MutationObserver for adding the initial current user row
        // The click handler handles that when rowCountBefore === 0
        // These events are only for other purposes (like autoAddCurrentUserSplit for remainder calculations)
        
        // Listen for Select2 change events on user fields (for autocomplete)
        if ($) {
            $(document).on('select2:select select2:clear', 'select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]', function(e) {
                const row = $(this).closest('tr, .form-row, .inline-related')[0];
                const selectedUserId = $(this).val();
                const currentUserId = findCurrentUserId();
                
                console.log('[Select2UserSelected] User selected via Select2:', selectedUserId, 'Current user:', currentUserId);
                
                // Ensure first row is always current user
                setTimeout(function() {
                    ensureFirstRowIsCurrentUser();
                }, 100);
                
                if (row && selectedUserId && selectedUserId != currentUserId) {
                    console.log('[Select2UserSelected] Different user selected, will auto-add current user row');
                    // Wait a bit longer to ensure the value is fully set
                    setTimeout(function() {
                        console.log('[Select2UserSelected] Calling autoAddCurrentUserSplit after delay');
                        // Force a re-check by calling it multiple times with delays
                        autoAddCurrentUserSplit();
                        setTimeout(autoAddCurrentUserSplit, 200);
                        setTimeout(autoAddCurrentUserSplit, 500);
                        
                        // Also handle method-specific calculations
                        const method = getCurrentSplitMethod();
                        if (method === 'shares') {
                            setTimeout(function() {
                                recalculateAllSplits();
                                setTimeout(autoAddCurrentUserSplit, 200);
                            }, 100);
                        } else if (method === 'percentage') {
                            calculateSplitAmount(row);
                            setTimeout(autoAddCurrentUserSplit, 200);
                        } else {
                            setTimeout(autoAddCurrentUserSplit, 200);
                        }
                    }, 500);
                }
            });
        }
    }
    // Setup split calculator
    setupSplitCalculator();
    
    // Hide edit and view buttons for user autocomplete fields in splits
    function hideUserAutocompleteButtons() {
        // Find all user autocomplete fields in splits
        const userSelects = document.querySelectorAll('select[id*="splits-"][id*="user"], select[name*="splits-"][name*="user"]');
        userSelects.forEach(function(select) {
            // Find the Select2 container
            const select2Container = select.nextElementSibling;
            if (select2Container && select2Container.classList.contains('select2-container')) {
                // Find and hide any edit/view links after the Select2 container
                let nextSibling = select2Container.nextElementSibling;
                while (nextSibling) {
                    if (nextSibling.tagName === 'A' && (nextSibling.href.includes('user') || nextSibling.textContent.includes('edit') || nextSibling.textContent.includes('view'))) {
                        nextSibling.style.display = 'none';
                    }
                    nextSibling = nextSibling.nextElementSibling;
                }
                // Also check for buttons inside the Select2 container
                const buttons = select2Container.querySelectorAll('a[href*="user"]');
                buttons.forEach(function(btn) {
                    btn.style.display = 'none';
                });
            }
            // Also hide any links in the same table cell/row
            const row = select.closest('tr, .form-row');
            if (row) {
                const links = row.querySelectorAll('a[href*="user"]');
                links.forEach(function(link) {
                    if (link.textContent.includes('edit') || link.textContent.includes('view') || link.classList.contains('related-lookup')) {
                        link.style.display = 'none';
                    }
                });
            }
        });
    }
    
    // Hide buttons on page load
    hideUserAutocompleteButtons();
    
    // Hide buttons when new rows are added (observe DOM changes)
    const observer = new MutationObserver(function(mutations) {
        hideUserAutocompleteButtons();
    });
    
    // Observe the splits inline group for changes
    const splitGroup = document.querySelector('#splits-group, .inline-group');
    if (splitGroup) {
        observer.observe(splitGroup, {
            childList: true,
            subtree: true
        });
    }
});
</script>
