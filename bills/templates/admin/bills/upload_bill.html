{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
    <h2>📸 Upload Bill Image</h2>
    <form method="post" enctype="multipart/form-data" style="margin-top: 20px;">
        {% csrf_token %}
        <label for="id_image">Choose image or use camera:</label><br>
        <input
        type="file"
        name="image"
        id="id_image"
        accept="image/*"
        capture="environment"
        required
        >
        <br><br>
        <button type="submit" class="button default">Upload</button>
        <a href=".." class="button cancel-link">Cancel</a>
    </form>
{% endblock %}
